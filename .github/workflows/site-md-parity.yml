name: Site MD parity check

on:
  push:
    branches: [main, master]
    paths:
      - 'site/**'
      - 'tools/check_site_md_parity.py'
      - 'tools/gen_cc_overview.py'
      - 'tools/gen_cc_arch_treemap.py'
      - 'tools/check_cc_loop_steps.py'
      - 'tools/cc_loop_relay_demo.py'
      - 'tools/cc_loop_sse_relay.py'
      - 'tools/cc_loop_demo_events.py'
      - 'projects/cc-loop-live/**'
      - '.github/workflows/site-md-parity.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'tools/check_site_md_parity.py'
      - 'tools/gen_cc_overview.py'
      - 'tools/gen_cc_arch_treemap.py'
      - 'tools/check_cc_loop_steps.py'
      - 'tools/cc_loop_relay_demo.py'
      - 'tools/cc_loop_sse_relay.py'
      - 'tools/cc_loop_demo_events.py'
      - 'projects/cc-loop-live/**'
      - '.github/workflows/site-md-parity.yml'

jobs:
  site-md-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify HTML ↔ site/md pairs and blob links
        run: python3 tools/check_site_md_parity.py
      - name: CC overview — JSON valid and HTML in sync
        run: |
          python3 tools/gen_cc_overview.py --check
          python3 tools/gen_cc_overview.py --verify-in-sync
      - name: CC architecture treemap JSON
        run: python3 tools/gen_cc_arch_treemap.py --verify-in-sync
      - name: Schema-check cc-loop-steps.json
        run: python3 tools/check_cc_loop_steps.py
